<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alex — Alex Automotive AI Voice Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090b;--s1:#0e1114;--s2:#13171c;--s3:#1a2028;
      --border:#1f2830;--border2:#263040;
      --green:#00ff87;--gdim:#00c866;--gdark:#007a3d;--glow:#00ff8722;--glow2:#00ff8744;
      --amber:#ffb830;--blue:#38bdf8;--red:#ff4060;--purple:#a78bfa;
      --text:#ddeeff;--sub:#7a9bb5;--muted:#3a5268;
      --user-bub:#0a2218;--user-border:#0f3a28;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 70% 45% at 50% -5%,#00ff8712 0%,transparent 65%),
                 radial-gradient(ellipse 40% 30% at 85% 80%,#38bdf808 0%,transparent 60%);
      pointer-events:none}
    body::after{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),
                       linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:52px 52px;opacity:.22;pointer-events:none}
    #app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:740px;margin:0 auto}

    /* HEADER */
    header{flex-shrink:0;padding:0 22px;border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
    .hrow{display:flex;align-items:center;gap:14px;padding:13px 0}
    .logo{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--green);
      display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;
      box-shadow:0 0 0 4px var(--glow),0 0 22px var(--glow2);
      animation:rpulse 3s ease-in-out infinite;position:relative}
    @keyframes rpulse{0%,100%{box-shadow:0 0 0 3px var(--glow),0 0 18px var(--glow)}50%{box-shadow:0 0 0 7px var(--glow),0 0 40px var(--glow2)}}
    .pip{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;
      background:var(--green);border:2px solid var(--bg);animation:pipa 1.3s ease infinite alternate}
    @keyframes pipa{from{opacity:1}to{opacity:.25}}
    .htxt{flex:1}
    .htxt h1{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.09em;line-height:1}
    .htxt h1 span{color:var(--green)}
    .htxt p{font-size:.68rem;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
    .hbadges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.07em;
      padding:3px 9px;border-radius:4px;border:1px solid}
    .badge.live{color:var(--green);border-color:var(--gdark);background:#00ff8710}
    .badge.book{color:var(--amber);border-color:#7a5010;background:#ffb83010}
    .badge.eleven{color:var(--purple);border-color:#4c2d9a;background:#a78bfa10}

    /* BOOKING PROGRESS */
    #progress{display:none;align-items:center;gap:5px;padding:8px 0 10px}
    .bstep{flex:1;height:2.5px;border-radius:99px;background:var(--border2);transition:background .4s}
    .bstep.done{background:var(--green)}
    .bstep.active{background:linear-gradient(90deg,var(--green),var(--gdim));animation:bshine 1.4s ease infinite}
    @keyframes bshine{0%,100%{opacity:1}50%{opacity:.55}}
    #bplabel{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.07em;flex-shrink:0;margin-left:3px}

    /* AUDIO SOURCE INDICATOR */
    #audiosrc{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--purple);letter-spacing:.06em;
      padding:3px 9px;border-radius:4px;border:1px solid #4c2d9a;background:#a78bfa10;display:none;flex-shrink:0}

    /* CHAT */
    #chat{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
    #chat::-webkit-scrollbar{width:3px}
    #chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
    .msg{display:flex;gap:9px;align-items:flex-end;animation:mup .26s cubic-bezier(.22,1,.36,1) both}
    @keyframes mup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{flex-direction:row-reverse}
    .ava{width:30px;height:30px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .msg.alex .ava{background:var(--green);color:#000;box-shadow:0 0 10px var(--glow2)}
    .msg.user .ava{background:var(--s3);color:var(--sub);border:1px solid var(--border2)}
    .bub{max-width:82%;padding:11px 15px;border-radius:18px;line-height:1.62;font-size:.87rem;font-weight:300}
    .msg.alex .bub{background:var(--s2);border:1px solid var(--border2);border-bottom-left-radius:4px}
    .msg.user .bub{background:var(--user-bub);border:1px solid var(--user-border);border-bottom-right-radius:4px;color:#b8f0d8}
    .bub strong{color:var(--green);font-weight:500}

    /* booking card */
    .bcard{margin-top:10px;padding:12px 14px;background:var(--s3);border:1px solid var(--green);border-radius:10px;font-size:.81rem}
    .bcard .lbl{color:var(--sub);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
    .bcard .val{color:var(--text);font-weight:500;margin-bottom:8px}
    .bcard .val:last-child{margin-bottom:0}

    /* LIVE TEXT */
    #live{flex-shrink:0;min-height:24px;padding:3px 22px;font-size:.73rem;color:var(--sub);font-style:italic}

    /* STATUS BAR */
    #sbar{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:3px 22px 5px;
      font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.04em;color:var(--muted);min-height:26px}
    #sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
    #sdot.listening{background:var(--green);animation:db .5s ease infinite alternate}
    #sdot.speaking{background:var(--blue);animation:db .8s ease infinite alternate}
    #sdot.booking{background:var(--amber);animation:db 1s ease infinite alternate}
    #sdot.eleven{background:var(--purple);animation:db .6s ease infinite alternate}
    #sdot.error{background:var(--red)}
    @keyframes db{from{opacity:1}to{opacity:.15}}
    #wave{display:flex;align-items:center;gap:2px;height:14px;opacity:0;transition:opacity .3s;margin-left:2px}
    #wave.on{opacity:1}
    #wave i{display:block;width:2.5px;border-radius:99px;background:var(--green)}
    #wave i:nth-child(1){height:4px;animation:wv 1s ease-in-out infinite 0s}
    #wave i:nth-child(2){height:9px;animation:wv 1s ease-in-out infinite .1s}
    #wave i:nth-child(3){height:14px;animation:wv 1s ease-in-out infinite .2s}
    #wave i:nth-child(4){height:9px;animation:wv 1s ease-in-out infinite .1s}
    #wave i:nth-child(5){height:4px;animation:wv 1s ease-in-out infinite 0s}
    @keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.28)}}

    /* CONTROLS */
    #controls{flex-shrink:0;padding:8px 18px 16px;display:flex;flex-direction:column;align-items:center;gap:9px}
    #mic{width:100%;max-width:460px;height:62px;border:none;border-radius:12px;cursor:pointer;
      background:linear-gradient(135deg,var(--gdim),var(--green));
      font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.12em;color:#000;
      display:flex;align-items:center;justify-content:center;gap:11px;
      box-shadow:0 0 28px var(--glow2),0 4px 18px #00000055;
      transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
    #mic::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff1a,transparent);pointer-events:none}
    #mic:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 48px var(--glow2),0 8px 26px #00000070}
    #mic:active:not(:disabled){transform:translateY(1px)}
    #mic:disabled{opacity:.35;cursor:not-allowed}
    #mic.on{background:linear-gradient(135deg,#8a001a,var(--red));box-shadow:0 0 28px #ff406025,0 4px 18px #00000055}

    .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:560px}
    .chip{background:var(--s2);border:1px solid var(--border2);color:var(--sub);
      font-size:.67rem;letter-spacing:.04em;padding:5px 13px;border-radius:6px;cursor:pointer;
      font-family:'JetBrains Mono',monospace;transition:border-color .2s,color .2s,background .2s}
    .chip:hover{border-color:var(--gdim);color:var(--green);background:#00ff870a}
    .chip.amber{border-color:#7a5010;color:var(--amber)}
    .chip.amber:hover{border-color:var(--amber);background:#ffb83010}

    /* typing dots */
    .tdots{display:flex;align-items:center;gap:5px;padding:11px 15px}
    .tdots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:td .85s ease infinite}
    .tdots span:nth-child(2){animation-delay:.16s}
    .tdots span:nth-child(3){animation-delay:.32s}
    @keyframes td{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.6)}}

    /* PRICE CARD */
    .pcard{margin-top:10px;background:var(--s3);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
    .pcard-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 12px 6px}
    .prow{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border)}
    .prow:first-of-type{border-top:none}
    .prow .pname{font-size:.83rem;font-weight:400;color:var(--text)}
    .prow .ptag{font-size:.7rem;color:var(--sub);margin-left:6px}
    .prow .pprice{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:500;color:var(--green)}
    .prow.highlight{background:#00ff870a}
    .prow.highlight .pname{color:var(--green)}
    .ptax{font-size:.68rem;color:var(--muted);padding:6px 12px 8px;border-top:1px solid var(--border)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="hrow">
      <div class="logo">🚗<div class="pip"></div></div>
      <div class="htxt">
        <h1>ALEX <span>AUTO</span></h1>
        <p>AI Voice Specialist · Test Drives · EVs · Financing</p>
      </div>
      <div class="hbadges">
        <div class="badge live">● LIVE</div>
        <div class="badge book">BOOK NOW</div>
        <div class="badge eleven" id="elvbadge" style="display:none">♪ ELEVENLABS</div>
      </div>
    </div>
    <div id="progress">
      <div class="bstep" id="bp0"></div>
      <div class="bstep" id="bp1"></div>
      <div class="bstep" id="bp2"></div>
      <div class="bstep" id="bp3"></div>
      <div class="bstep" id="bp4"></div>
      <span id="bplabel">BOOKING</span>
    </div>
  </header>

  <div id="chat"></div>
  <div id="live"></div>
  <div id="sbar">
    <div id="sdot"></div>
    <span id="stxt">Tap the mic — then just talk naturally</span>
    <div id="wave"><i></i><i></i><i></i><i></i><i></i></div>
  </div>

  <div id="controls">
    <button id="mic">🎤 &nbsp; START TALKING TO ALEX</button>
    <div class="chips">
      <div class="chip" onclick="chip('What cars do you have in stock?')">🚘 Inventory</div>
      <div class="chip amber" onclick="chip('I want to book a test drive')">📅 Test Drive</div>
      <div class="chip" onclick="chip('Tell me about your electric cars')">⚡ EVs</div>
      <div class="chip" onclick="chip('What trucks do you have?')">🛻 Trucks</div>
      <div class="chip" onclick="chip('Tell me about the Mustang')">🐎 Mustang</div>
      <div class="chip amber" onclick="chip('I need to book a service appointment')">🔧 Service</div>
      <div class="chip" onclick="chip('What financing options do you have?')">💳 Finance</div>
      <div class="chip" onclick="chip('Where are you located?')">📍 Find Us</div>
      <div class="chip" onclick="chip('Tell me about your SUVs')">🚙 SUVs</div>
      <div class="chip amber" onclick="chip('I want a consultation with your team')">🤝 Consult</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ALEX AUTO — Production AI Voice Agent
//  Architecture: ElevenLabs MP3 (primary) → Web Speech (fallback)
//  Scalable intent engine: add new intents in RESPONSE_RULES
// ═══════════════════════════════════════════════════════════════

// ── CONFIG (set via panel or environment) ────────────────────
let CFG = {
  voiceId : sessionStorage.getItem('elv_voice_id') || '',
  apiKey  : sessionStorage.getItem('elv_api_key')  || '',
  cdnBase : sessionStorage.getItem('elv_cdn_base') || '',
  // Booking webhook — POST booking data here when complete
  bookingEndpoint: '/api/bookings',
};

// ── DOM REFS ─────────────────────────────────────────────────
const chatEl  = document.getElementById('chat');
const micBtn  = document.getElementById('mic');
const sdot    = document.getElementById('sdot');
const stxt    = document.getElementById('stxt');
const waveEl  = document.getElementById('wave');
const liveEl  = document.getElementById('live');
const progEl  = document.getElementById('progress');

// ── STATE ────────────────────────────────────────────────────
let SR            = null;
let conversationOn= false;
let alexTalking   = false;
let silenceTimer  = null;
let resumeTimer   = null;
let currentAudio  = null; // HTMLAudioElement for ElevenLabs MP3

// ── BOOKING STATE MACHINE ────────────────────────────────────
const BOOKING_STEPS = ['vehicle','date','name','phone','email'];
let B = {active:false,step:0,type:'test drive',vehicle:'',date:'',name:'',phone:'',email:''};

function resetBooking(){
  B={active:false,step:0,type:'test drive',vehicle:'',date:'',name:'',phone:'',email:''};
  progEl.style.display='none';
}
function setProgress(i){
  BOOKING_STEPS.forEach((_,idx)=>{
    const el=document.getElementById('bp'+idx);
    if(!el)return;
    el.className='bstep'+(idx<i?' done':idx===i?' active':'');
  });
  const labels=['VEHICLE','DATE / TIME','YOUR NAME','PHONE','EMAIL'];
  document.getElementById('bplabel').textContent=i>=0&&i<labels.length?labels[i]:'BOOKING';
}

// ── HELPERS ──────────────────────────────────────────────────
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ═══════════════════════════════════════════════════════════════
//  RESPONSE BANK — all written for natural TTS delivery
//  Shorter sentences, contractions, spoken numbers, spoken rhythm
// ═══════════════════════════════════════════════════════════════
const R = {
  greet:[
    `Hey, welcome to Alex Automotive! I'm Alex and I genuinely love helping people find the right car. Are you shopping for something specific today or just exploring your options?`,
    `Oh hey, welcome in! I'm Alex, your car specialist here at Alex Auto. We've got a really solid lineup right now and I'd love to help you find something you're excited about. What are you thinking?`,
    `Hi there! Great timing. I'm Alex. Whether you're after a test drive, curious about pricing, or want to explore financing, I'm here for all of it. What's on your mind?`,

  ],
  inventory:[
    `Oh great question! Right now we've got a really solid spread across sedans, SUVs, trucks and EVs. I've pulled up our current lineup for you. What kind of driving do you mostly do? That'll help me point you to the right section.`+
    `<div class="pcard"><div class="pcard-title">Current Inventory Overview</div>`+
    `<div class="prow"><span class="pname">Sedans</span><span class="pprice">from $23,500</span></div>`+

    `<div class="prow highlight"><span class="pname">Trucks <span class="ptag">Best sellers</span></span><span class="pprice">from $35,000</span></div>`+
    `<div class="prow"><span class="pname">Electric Vehicles</span><span class="pprice">from $26,500</span></div>`+
    `</div>`,
    `Sure! We're stocked up well across all categories. Some really exciting stuff just came in too. What matters most to you, is it reliability, fuel economy, looks or size? Let's figure out what fits your life.`,
  ],
  trucks:[
    `Oh yeah, trucks! Now we're talking. We've got four great options on the lot right now. The F-150 is honestly our best seller, super versatile. The Ram has an incredible interior that almost feels luxury. Are you using it more for work, hauling stuff, or weekend adventures?`+
    `<div class="pcard"><div class="pcard-title">Trucks — Starting Prices</div>`+
    `<div class="prow highlight"><span class="pname">Ford F-150 <span class="ptag">Best seller</span></span><span class="pprice">$39,000</span></div>`+
    `<div class="prow"><span class="pname">Chevy Silverado</span><span class="pprice">$41,500</span></div>`+
    `<div class="prow"><span class="pname">Ram 1500 <span class="ptag">Luxury interior</span></span><span class="pprice">$43,200</span></div>`+
    `<div class="prow"><span class="pname">Toyota Tacoma <span class="ptag">Most reliable</span></span><span class="pprice">$35,000</span></div>`+
    `</div>`,
    `Trucks, love it! We have the F-150, Silverado, Ram 1500 and Tacoma all on the lot. The F-150 is the crowd favourite. The Tacoma is basically bulletproof reliable. What would you be doing with it mostly?`+
    `<div class="pcard"><div class="pcard-title">Trucks — Starting Prices</div>`+
    `<div class="prow highlight"><span class="pname">Ford F-150</span><span class="pprice">$39,000</span></div>`+
    `<div class="prow"><span class="pname">Chevy Silverado</span><span class="pprice">$41,500</span></div>`+
    `<div class="prow"><span class="pname">Ram 1500</span><span class="pprice">$43,200</span></div>`+
    `<div class="prow"><span class="pname">Toyota Tacoma</span><span class="pprice">$35,000</span></div>`+
    `</div>`,
  ],
  electric:[
    `Smart move. EVs are honestly where it's at right now. We've got four great options and you might also qualify for a federal $7,500 tax credit depending on your income. Is this your first EV or are you upgrading from one?`+
    `<div class="pcard"><div class="pcard-title">Electric Vehicles — Starting Prices</div>`+
    `<div class="prow highlight"><span class="pname">Chevy Bolt EV <span class="ptag">Best value</span></span><span class="pprice">$26,500</span></div>`+
    `<div class="prow"><span class="pname">Hyundai Ioniq 6 <span class="ptag">Stunning design</span></span><span class="pprice">$38,600</span></div>`+

    `</div>`,
    `Ooh, going electric, love that! The Bolt is crazy good value. The Mach-E looks amazing. Want to set up a test drive so you can really feel the difference? It's a game changer.`+
    `<div class="pcard"><div class="pcard-title">EV Lineup — Starting Prices</div>`+

    `<div class="prow"><span class="pname">Ford Mustang Mach-E</span><span class="pprice">$43,000</span></div>`+

  ],
  mustang:[
    `The Mustang, okay this is genuinely my favourite topic. We've got the full lineup from the peppy EcoBoost all the way to the track-ready Dark Horse. Have you ever driven a V8 Mustang? Because if not, the GT might just change your life.`+
    `<div class="pcard"><div class="pcard-title">Mustang Lineup — Starting Prices</div>`+
    `<div class="prow"><span class="pname">EcoBoost <span class="ptag">Great on fuel</span></span><span class="pprice">$32,500</span></div>`+
    `<div class="prow highlight"><span class="pname">GT V8 <span class="ptag">Iconic sound</span></span><span class="pprice">$42,500</span></div>`+
    `<div class="prow"><span class="pname">Dark Horse <span class="ptag">Track ready</span></span><span class="pprice">$57,900</span></div>`+
    `<div class="prow"><span class="pname">Mach-E <span class="ptag">Fully electric</span></span><span class="pprice">$43,000</span></div>`+
    `</div>`,
  ],
  suv:[
    `SUVs are our most popular category right now and honestly for good reason. We've got four great options. What's your main priority, is it space, fuel economy or staying within a certain budget?`+
    `<div class="pcard"><div class="pcard-title">SUVs — Starting Prices</div>`+
    `<div class="prow"><span class="pname">Kia Sportage <span class="ptag">Best value</span></span><span class="pprice">$29,800</span></div>`+
    `<div class="prow highlight"><span class="pname">Toyota RAV4 <span class="ptag">Most popular</span></span><span class="pprice">$31,200</span></div>`+
    `<div class="prow"><span class="pname">Chevy Equinox</span><span class="pprice">$33,500</span></div>`+
    `<div class="prow"><span class="pname">Ford Explorer <span class="ptag">Best for families</span></span><span class="pprice">$42,000</span></div>`+
    `</div>`,
    `Great choice! SUVs are flying off the lot right now. The RAV4 and Explorer are our most popular. The Sportage punches way above its price point. Want me to set up a time to come try one out?`+

// ═══════════════════════════════════════════════════════════════
//  AUDIO MAP
//  Maps intent keys → pre-rendered ElevenLabs MP3 filenames
//  Loaded from CFG.cdnBase + filename
//  TO ADD A NEW INTENT: add entry here + entry in RESPONSE_RULES
//  Leave empty [] if no MP3 recorded yet (falls back to TTS)
// ═══════════════════════════════════════════════════════════════
const AUDIO_MAP = {
  greet:     ['greet_01.mp3','greet_02.mp3','greet_03.mp3','greet_04.mp3'],
  inventory: ['inventory_01.mp3','inventory_02.mp3'],
  trucks:    ['trucks_01.mp3','trucks_02.mp3'],
  electric:  ['electric_01.mp3','electric_02.mp3'],
  mustang:   ['mustang_01.mp3'],
  suv:       ['suv_01.mp3','suv_02.mp3'],
  sedan:     ['sedan_01.mp3'],
  finance:   ['finance_01.mp3'],
  hours:     ['hours_01.mp3'],
  service:   ['service_01.mp3','service_02.mp3'],
  consult:   ['consult_01.mp3'],
  bookStart: ['book_start_01.mp3','book_start_02.mp3'],
  thanks:    ['thanks_01.mp3','thanks_02.mp3'],
  bye:       ['bye_01.mp3','bye_02.mp3'],
  fallback:  ['fallback_01.mp3','fallback_02.mp3'],
  // Dynamic booking steps (bookVehicle, bookDate, etc.) are intentionally
  // absent — they contain user-supplied names/dates so must use TTS
};

function pickAudioUrl(intentKey){
  if(!CFG.cdnBase||!intentKey) return null;
  const files=AUDIO_MAP[intentKey];
  if(!files||files.length===0) return null;
  return CFG.cdnBase.replace(/\/?$/,'/')+pick(files);
}

// Preload likely next audio while Alex is speaking
function preloadAudio(intentKey){
  const url=pickAudioUrl(intentKey);
  if(!url)return;
  const a=new Audio();
  a.preload='auto';
  a.src=url;
}

// ═══════════════════════════════════════════════════════════════
//  INTENT RULES — add new intents as single-line entries here
//  { test: /regex/, key: 'mapKey', action: ()=>responseText }
// ═══════════════════════════════════════════════════════════════
const RESPONSE_RULES = [
  // Booking triggers (must be first — highest priority)
  {
    test:/\b(book|schedule|appointment|reserve|arrange)\b|\btest.?drive\b|\bservice\s+appoint/i,
    key:'bookStart',
    action:(t)=>{
      if(/service|mainten/i.test(t)) B.type='service appointment';
      else if(/consult/i.test(t))     B.type='consultation';
      else                             B.type='test drive';
      B.active=true; B.step=0;
      progEl.style.display='flex'; setProgress(0);
      return pick(R.bookStart);
    }
  },
  { test:/\b(truck|pickup|f.?150|silverado|\bram\b|tacoma|tundra)\b/i,    key:'trucks',    action:()=>pick(R.trucks)    },
  { test:/\b(electric|ev\b|bolt\b|ioniq|mach.?e|tesla|plug.?in)\b/i,      key:'electric',  action:()=>pick(R.electric)  },
  { test:/\bmustang\b/i,                                                     key:'mustang',   action:()=>R.mustang[0]      },
  { test:/\b(suv|crossover|explorer|equinox|rav4|sportage|awd)\b/i,        key:'suv',       action:()=>pick(R.suv)       },
  { test:/\b(sedan|civic|camry|sonata|four.?door)\b/i,                      key:'sedan',     action:()=>R.sedan[0]        },
  { test:/\b(financ|loan|apr|monthly|payment|trade.?in|credit)\b/i,         key:'finance',   action:()=>R.finance[0]      },
  { test:/\b(hour|open|close|location|address|where|find\s*you|direction)\b/i, key:'hours', action:()=>R.hours[0]        },
  { test:/\b(service|mainten|oil\s*change|repair|diagnos|detail)\b/i,       key:'service',   action:()=>pick(R.service)   },
  { test:/\b(consult|meet|chat\s*with|speak\s*with|talk\s*to\s*someone)\b/i,key:'consult',  action:()=>R.consult[0]      },
  { test:/\b(thank|thanks|appreciate|great|awesome|perfect)\b/i,            key:'thanks',    action:()=>pick(R.thanks)    },
  { test:/\b(bye|goodbye|later|see\s*ya|gotta\s*go)\b/i,                    key:'bye',       action:()=>pick(R.bye)       },
  { test:/\b(car|vehicle|inventory|stock|model|option|available|show\s*me)\b/i, key:'inventory', action:()=>pick(R.inventory) },
  { test:/^(hi|hey|hello|good\s*(morning|afternoon|evening)|howdy)\b/i,    key:'greet',     action:()=>pick(R.greet)     },
  // ── ADD NEW INTENTS ABOVE THIS LINE ──────────────────────────
];

// ── BOOKING HANDLER ──────────────────────────────────────────
function handleBooking(input){
  const step=BOOKING_STEPS[B.step];
  if(step==='vehicle'){ B.vehicle=input.trim()||'a vehicle of your choice'; B.step++; setProgress(1); return {reply:R.bookVehicle(B.vehicle),key:null};}
  if(step==='date')   { B.date   =input.trim()||'a date to be confirmed';   B.step++; setProgress(2); return {reply:R.bookDate(B.date),key:null};   }
  if(step==='name')   { B.name   =input.trim()||'Valued Customer';          B.step++; setProgress(3); return {reply:R.bookName(B.name),key:null};   }
  if(step==='phone')  { B.phone  =input.trim()||'to be provided';           B.step++; setProgress(4); return {reply:R.bookPhone(B.phone),key:null}; }
  if(step==='email')  { B.email  =input.trim(); const html=R.bookDone(B); submitBooking({...B}); resetBooking(); return {reply:html,key:null}; }
}

// ── BOOKING WEBHOOK ──────────────────────────────────────────
async function submitBooking(data){
  try{
    await fetch(CFG.bookingEndpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...data,source:'alex-voice-agent',ts:new Date().toISOString()})
    });
  }catch(e){ console.warn('Booking submit failed:',e); }
}

// ── MAIN REPLY ENGINE ─────────────────────────────────────────
function getReply(input){
  if(B.active) return handleBooking(input);
  const t=input.toLowerCase();
  for(const rule of RESPONSE_RULES){
    if(rule.test.test(t)){
      return {reply:rule.action(t), key:rule.key};
    }
  }
  return {reply:pick(R.fallback), key:'fallback'};
}

// ═══════════════════════════════════════════════════════════════
//  ELEVENLABS STREAMING TTS (real-time generation)
//  Used when no CDN MP3 exists for this turn
// ═══════════════════════════════════════════════════════════════
async function speakElevenLabs(text, whenDone){
  if(!CFG.voiceId||!CFG.apiKey){ speakWebSpeech(text,whenDone); return; }
  try{
    setStatus('eleven','Alex is speaking — ElevenLabs...');
    const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${CFG.voiceId}/stream`,{
      method:'POST',
      headers:{
        'xi-api-key':CFG.apiKey,
        'Content-Type':'application/json',
        'Accept':'audio/mpeg'
      },
      body:JSON.stringify({
        text:text,
        model_id:'eleven_turbo_v2',
        voice_settings:{
          stability:0.38,          // lower = more expressive, less robotic gaps
          similarity_boost:0.82,   // stay close to chosen voice
          style:0.40,              // more natural conversational style
          use_speaker_boost:true   // crisper, reduces muddy pauses
        }
      })
    });
    if(!res.ok) throw new Error('ElevenLabs API error: '+res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    playAudioUrl(url,()=>{URL.revokeObjectURL(url);if(whenDone)whenDone();},whenDone);
  }catch(e){
    console.warn('ElevenLabs streaming failed, falling back:',e);
    speakWebSpeech(text,whenDone);
  }
}

// ── CDN MP3 PLAYER ────────────────────────────────────────────
function playAudioUrl(url, onEnd, whenDone){
  stopAll();
  currentAudio=new Audio(url);
  currentAudio.onplay  =()=>{ alexTalking=true; };
  currentAudio.onended =()=>{
    alexTalking=false; currentAudio=null;
    if(onEnd)onEnd(); else if(whenDone)whenDone();
    if(conversationOn) setTimeout(()=>startListening(),200);
  };
  currentAudio.onerror =()=>{
    alexTalking=false; currentAudio=null;
    // Fall through to Web Speech on MP3 error
    if(whenDone) speakWebSpeech('',whenDone);
    else if(conversationOn) setTimeout(()=>startListening(),400);
  };
  alexTalking=true;
  currentAudio.play().catch(()=>{ if(whenDone) speakWebSpeech('',whenDone); });
}

// ── TEXT CLEANER — strips HTML and fixes TTS gap-causing punctuation ──
function cleanForSpeech(rawHtml){
  const tmp=document.createElement('div');
  tmp.innerHTML=rawHtml;
  let t=(tmp.textContent||tmp.innerText||'');
  t=t.replace(/\s*—\s*/g,', ')        // em-dash → comma (no long pause)
     .replace(/\s*–\s*/g,', ')        // en-dash
     .replace(/\.{2,}/g,'.')          // ellipsis → single period
     .replace(/\s*:\s*/g,', ')        // colons cause weird TTS stops
     .replace(/([!?])\s+/g,'$1 ')     // tighten after ! ?
     .replace(/\s{2,}/g,' ')          // collapse double spaces
     .replace(/\n+/g,' ')             // strip newlines
     .trim();
  return t;
}

// ── WEB SPEECH FALLBACK ───────────────────────────────────────
function speakWebSpeech(rawHtml, whenDone){
  const plain=cleanForSpeech(rawHtml);
  if(!plain) return;
  window.speechSynthesis.cancel();
  clearTimeout(resumeTimer);
  const u=new SpeechSynthesisUtterance(plain);
  u.rate=1.08; u.pitch=1.0; u.volume=1;
  const voices=window.speechSynthesis.getVoices();
  // Priority list: most natural-sounding US English voices first
  const preferred=[
    'Google US English','Samantha','Microsoft Aria Online (Natural)','Microsoft Jenny Online (Natural)',
    'Microsoft Aria','Microsoft Jenny','Karen','Moira','en-US-Neural'
  ];
  let chosen=null;
  for(const name of preferred){ chosen=voices.find(v=>v.name.includes(name)); if(chosen)break; }
  if(!chosen) chosen=voices.find(v=>/en[-_]US/i.test(v.lang)&&v.localService===false); // prefer cloud voices
  if(!chosen) chosen=voices.find(v=>/en[-_]US/i.test(v.lang));
  if(chosen) u.voice=chosen;
  function keepAlive(){clearTimeout(resumeTimer);resumeTimer=setTimeout(()=>{if(window.speechSynthesis.speaking){window.speechSynthesis.pause();window.speechSynthesis.resume();keepAlive();}},10000);}
  u.onstart=()=>{ alexTalking=true; keepAlive(); setStatus('speaking','Alex is talking...'); };
  u.onend  =()=>{ alexTalking=false; clearTimeout(resumeTimer); if(whenDone)whenDone(); if(conversationOn)setTimeout(()=>startListening(),200); };
  u.onerror=()=>{ alexTalking=false; clearTimeout(resumeTimer); if(whenDone)whenDone(); if(conversationOn)setTimeout(()=>startListening(),200); };
  window.speechSynthesis.speak(u);
}

// ── UNIFIED SPEAK ENTRY POINT ────────────────────────────────
// Priority: CDN MP3 → ElevenLabs stream → Web Speech
function speakAlex(rawHtml, intentKey, whenDone){
  stopAll();
  const plain=stripHtml(rawHtml);
  const cdnUrl=pickAudioUrl(intentKey);
  if(cdnUrl){
    setStatus('eleven','Alex is speaking — ElevenLabs...');
    playAudioUrl(cdnUrl,null,whenDone);
  } else if(CFG.voiceId&&CFG.apiKey&&plain){
    speakElevenLabs(plain,whenDone);
  } else {
    setStatus('speaking','Alex is talking...');
    speakWebSpeech(rawHtml,whenDone);
  }
}

function stripHtml(h){ return cleanForSpeech(h); }

function stopAll(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  window.speechSynthesis.cancel();
  clearTimeout(resumeTimer);
  alexTalking=false;
}

// ── ALEX RESPONDS ─────────────────────────────────────────────
function alexReply(userText){
  if(!userText.trim())return;
  addMsg('user',userText);
  liveEl.textContent='';
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const {reply,key}=getReply(userText);
    addMsg('alex',reply);
    speakAlex(reply,key);
    setStatus(B.active?'booking':'speaking','Alex is talking...');
  },120+Math.random()*80);
}

function chip(text){ stopAll(); alexReply(text); }

// ── SPEECH RECOGNITION ────────────────────────────────────────
function initSR(){
  const API=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!API){ micBtn.textContent='⚠️  USE BUTTONS BELOW'; micBtn.disabled=true; setStatus('error','Voice not supported — use Chrome on desktop'); return; }
  SR=new API();
  SR.continuous=false; SR.interimResults=true; SR.lang='en-US'; SR.maxAlternatives=1;
  SR.onstart=()=>setStatus('listening','Listening... go ahead!');
  SR.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=t; else interim+=t;
    }
    liveEl.textContent=interim||final||'';
    if(final.trim()){ clearTimeout(silenceTimer); liveEl.textContent=''; stopListening(); alexReply(final.trim()); }
    else if(interim.trim()){
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(()=>{ if(interim.trim().length>1){ liveEl.textContent=''; stopListening(); alexReply(interim.trim()); }},1800);
    }
  };
  SR.onerror=(e)=>{
    clearTimeout(silenceTimer);
    if(e.error==='no-speech'){ if(conversationOn&&!alexTalking) setTimeout(()=>startListening(),600); }
    else if(e.error==='not-allowed'){ conversationOn=false; updateMicBtn(); setStatus('error','Mic blocked — check browser permissions'); }
  };
  SR.onend=()=>{ if(conversationOn&&!alexTalking) setTimeout(()=>startListening(),300); };
}

function startListening(){ if(!SR||alexTalking)return; try{SR.abort();}catch(e){} try{SR.start();}catch(e){} }
function stopListening(){ try{SR.stop();}catch(e){} }

function updateMicBtn(){
  if(conversationOn){ micBtn.textContent='🔴  END CONVERSATION'; micBtn.classList.add('on'); }
  else{ micBtn.textContent='🎤  START TALKING TO ALEX'; micBtn.classList.remove('on'); setStatus('','Tap the mic — then just talk naturally'); waveEl.classList.remove('on'); }
}
micBtn.addEventListener('click',()=>{
  conversationOn=!conversationOn; updateMicBtn();
  if(conversationOn){ stopAll(); startListening(); }
  else{ stopListening(); stopAll(); clearTimeout(silenceTimer); }
});

// ── UI HELPERS ────────────────────────────────────────────────
function setStatus(state,text){
  sdot.className=state; stxt.textContent=text;
  waveEl.classList.toggle('on',state==='listening');
}
function addMsg(role,html){
  const wrap=document.createElement('div'); wrap.className=`msg ${role}`;
  const av=document.createElement('div'); av.className='ava'; av.textContent=role==='alex'?'A':'🙂';
  const b=document.createElement('div'); b.className='bub';
  b.innerHTML=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  wrap.appendChild(av); wrap.appendChild(b); chatEl.appendChild(wrap);
  chatEl.scrollTop=chatEl.scrollHeight;
}
function showTyping(){ removeTyping(); const d=document.createElement('div'); d.className='msg alex'; d.id='typ'; const av=document.createElement('div'); av.className='ava'; av.textContent='A'; const b=document.createElement('div'); b.className='bub tdots'; b.innerHTML='<span></span><span></span><span></span>'; d.appendChild(av); d.appendChild(b); chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; }
function removeTyping(){ const e=document.getElementById('typ'); if(e)e.remove(); }

// ── VOICE INIT ────────────────────────────────────────────────
function initVoices(cb){ const v=window.speechSynthesis.getVoices(); if(v.length>0){cb();return;} window.speechSynthesis.onvoiceschanged=()=>cb(); window.speechSynthesis.getVoices(); }

// ── BOOT ──────────────────────────────────────────────────────
initSR();
initVoices(()=>{
  setTimeout(()=>{
    const intro=pick(R.greet);
    addMsg('alex',intro);
    speakAlex(intro,'greet');
  },500);
});
