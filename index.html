<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alex — Alex Automotive</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090b; --s2:#13171c; --s3:#1a2028;
      --border:#1f2830; --border2:#263040;
      --green:#00ff87; --gdim:#00c866; --gdark:#007a3d; --glow:#00ff8722; --glow2:#00ff8744;
      --amber:#ffb830; --blue:#38bdf8; --red:#ff4060;
      --text:#ddeeff; --sub:#7a9bb5; --muted:#3a5268;
      --user-bub:#0a2218; --user-border:#0f3a28;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 70% 45% at 50% -5%,#00ff8712 0%,transparent 65%),
                 radial-gradient(ellipse 40% 30% at 85% 80%,#38bdf808 0%,transparent 60%);
      pointer-events:none}
    body::after{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),
                       linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:52px 52px;opacity:.22;pointer-events:none}

    #app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:720px;margin:0 auto}

    header{flex-shrink:0;padding:0 22px;border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
    .hrow{display:flex;align-items:center;gap:14px;padding:13px 0}
    .logo{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--green);
      display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;
      box-shadow:0 0 0 4px var(--glow),0 0 22px var(--glow2);
      animation:rpulse 3s ease-in-out infinite;position:relative}
    @keyframes rpulse{0%,100%{box-shadow:0 0 0 3px var(--glow),0 0 18px var(--glow)}50%{box-shadow:0 0 0 7px var(--glow),0 0 40px var(--glow2)}}
    .pip{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;
      background:var(--green);border:2px solid var(--bg);animation:pipa 1.3s ease infinite alternate}
    @keyframes pipa{from{opacity:1}to{opacity:.25}}
    .htxt{flex:1}
    .htxt h1{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.09em;line-height:1}
    .htxt h1 span{color:var(--green)}
    .htxt p{font-size:.68rem;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
    .hbadges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.07em;
      padding:3px 9px;border-radius:4px;border:1px solid}
    .badge.live{color:var(--green);border-color:var(--gdark);background:#00ff8710}
    .badge.ai{color:var(--blue);border-color:#1a4a6a;background:#38bdf810}

    #chat{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
    #chat::-webkit-scrollbar{width:3px}
    #chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

    .msg{display:flex;gap:9px;align-items:flex-end;animation:mup .26s cubic-bezier(.22,1,.36,1) both}
    @keyframes mup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{flex-direction:row-reverse}
    .ava{width:30px;height:30px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .msg.alex .ava{background:var(--green);color:#000;box-shadow:0 0 10px var(--glow2)}
    .msg.user .ava{background:var(--s3);color:var(--sub);border:1px solid var(--border2)}
    .bub{max-width:80%;padding:11px 15px;border-radius:18px;line-height:1.62;font-size:.88rem;font-weight:300}
    .msg.alex .bub{background:var(--s2);border:1px solid var(--border2);border-bottom-left-radius:4px}
    .msg.user .bub{background:var(--user-bub);border:1px solid var(--user-border);border-bottom-right-radius:4px;color:#b8f0d8}

    #live{flex-shrink:0;min-height:24px;padding:3px 22px;font-size:.73rem;color:var(--sub);font-style:italic}

    #sbar{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:3px 22px 5px;
      font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.04em;color:var(--muted);min-height:26px}
    #sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
    #sdot.listening{background:var(--green);animation:db .5s ease infinite alternate}
    #sdot.speaking{background:var(--blue);animation:db .8s ease infinite alternate}
    #sdot.thinking{background:var(--amber);animation:db .6s ease infinite alternate}
    #sdot.error{background:var(--red)}
    @keyframes db{from{opacity:1}to{opacity:.15}}
    #wave{display:flex;align-items:center;gap:2px;height:14px;opacity:0;transition:opacity .3s;margin-left:2px}
    #wave.on{opacity:1}
    #wave i{display:block;width:2.5px;border-radius:99px;background:var(--green)}
    #wave i:nth-child(1){height:4px;animation:wv 1s ease-in-out infinite 0s}
    #wave i:nth-child(2){height:9px;animation:wv 1s ease-in-out infinite .1s}
    #wave i:nth-child(3){height:14px;animation:wv 1s ease-in-out infinite .2s}
    #wave i:nth-child(4){height:9px;animation:wv 1s ease-in-out infinite .1s}
    #wave i:nth-child(5){height:4px;animation:wv 1s ease-in-out infinite 0s}
    @keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.28)}}

    #controls{flex-shrink:0;padding:8px 18px 16px;display:flex;flex-direction:column;align-items:center;gap:9px}
    #mic{width:100%;max-width:460px;height:62px;border:none;border-radius:12px;cursor:pointer;
      background:linear-gradient(135deg,var(--gdim),var(--green));
      font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.12em;color:#000;
      display:flex;align-items:center;justify-content:center;gap:11px;
      box-shadow:0 0 28px var(--glow2),0 4px 18px #00000055;
      transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
    #mic::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff1a,transparent);pointer-events:none}
    #mic:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 48px var(--glow2),0 8px 26px #00000070}
    #mic:active:not(:disabled){transform:translateY(1px)}
    #mic:disabled{opacity:.35;cursor:not-allowed}
    #mic.on{background:linear-gradient(135deg,#8a001a,var(--red));box-shadow:0 0 28px #ff406025,0 4px 18px #00000055}

    .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:520px}
    .chip{background:var(--s2);border:1px solid var(--border2);color:var(--sub);
      font-size:.67rem;letter-spacing:.04em;padding:5px 13px;border-radius:6px;cursor:pointer;
      font-family:'JetBrains Mono',monospace;transition:border-color .2s,color .2s,background .2s}
    .chip:hover{border-color:var(--gdim);color:var(--green);background:#00ff870a}
    .chip.amber{border-color:#7a5010;color:var(--amber)}
    .chip.amber:hover{border-color:var(--amber);background:#ffb83010}

    .tdots{display:flex;align-items:center;gap:5px;padding:11px 15px}
    .tdots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:td .85s ease infinite}
    .tdots span:nth-child(2){animation-delay:.16s}
    .tdots span:nth-child(3){animation-delay:.32s}
    @keyframes td{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.6)}}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="hrow">
      <div class="logo">🚗<div class="pip"></div></div>
      <div class="htxt">
        <h1>ALEX <span>AUTO</span></h1>
        <p>AI Specialist · Test Drives · EVs · Financing</p>
      </div>
      <div class="hbadges">
        <div class="badge live">● LIVE</div>
        <div class="badge ai">GPT-4o</div>
      </div>
    </div>
  </header>

  <div id="chat"></div>
  <div id="live"></div>
  <div id="sbar">
    <div id="sdot"></div>
    <span id="stxt">Tap the mic and just talk naturally</span>
    <div id="wave"><i></i><i></i><i></i><i></i><i></i></div>
  </div>

  <div id="controls">
    <button id="mic">🎤  START TALKING TO ALEX</button>
    <div class="chips">
      <div class="chip" onclick="chip('What cars do you have in stock?')">🚘 Inventory</div>
      <div class="chip amber" onclick="chip('I want to book a test drive')">📅 Book Test Drive</div>
      <div class="chip" onclick="chip('Tell me about your electric cars')">⚡ EVs</div>
      <div class="chip" onclick="chip('What trucks do you have?')">🛻 Trucks</div>
      <div class="chip" onclick="chip('Tell me about the Mustang')">🐎 Mustang</div>
      <div class="chip amber" onclick="chip('I need to book a service appointment')">🔧 Service</div>
      <div class="chip" onclick="chip('What financing options do you have?')">💳 Finance</div>
      <div class="chip" onclick="chip('Where are you located?')">📍 Find Us</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ALEX AI  —  OpenAI GPT-4o powered voice agent
//  One tap → full back-and-forth conversation
//  Interrupt anytime to stop Alex and reply
// ═══════════════════════════════════════════════════════

const OPENAI_KEY = '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';

const SYSTEM_PROMPT = `You are Alex, a warm, friendly, and knowledgeable car specialist at Alex Automotive dealership. You speak naturally like a real person — conversational, enthusiastic about cars, never robotic. You use light expressions like "oh yeah", "honestly", "you know", "great question" naturally — but not too much. You are helpful, professional, and genuinely care about finding the right car for each customer.

Your dealership details:
- Name: Alex Automotive
- Address: 1200 Auto Drive, Motorville
- Phone: (555) 280-4100
- Hours: Monday to Saturday 9 AM to 8 PM, Sunday 11 AM to 5 PM
- Website: alexautomotive.com

Inventory you can speak to:
Sedans: Honda Civic ($23,500), Toyota Camry ($27,900), Hyundai Sonata ($26,400)
SUVs: Ford Explorer ($42,000), Chevy Equinox ($33,500), Toyota RAV4 ($31,200), Kia Sportage ($29,800)
Trucks: Ford F-150 ($39,000), Chevy Silverado ($41,500), Ram 1500 ($43,200), Toyota Tacoma ($35,000)
Electric: Chevy Bolt EV ($26,500), Tesla Model 3 ($41,990), Ford Mustang Mach-E ($42,995), Hyundai Ioniq 6 ($38,615)
Mustang lineup: EcoBoost ($32,515), GT ($42,515), Dark Horse ($57,970), Mach-E ($42,995)
Financing: 0% APR for 36 months on select models, 60 and 72 month options, trade-in credit up to $5,000, quick pre-approval online.

Always use dollar signs and numbers for prices, never spell them out. Keep responses concise — 2 to 4 sentences max unless the customer asks for detail. Always guide customers toward booking a test drive or appointment. When someone wants to book, collect: vehicle interest, preferred date/time, their name, and phone number — one question at a time naturally. End bookings by saying a team member will call to confirm. Never use bullet points or hyphens in your spoken responses — speak in flowing natural sentences only.`;

// conversation history sent to OpenAI each turn
const history = [{ role: 'system', content: SYSTEM_PROMPT }];

const chatEl = document.getElementById('chat');
const micBtn = document.getElementById('mic');
const sdot   = document.getElementById('sdot');
const stxt   = document.getElementById('stxt');
const waveEl = document.getElementById('wave');
const liveEl = document.getElementById('live');

let SR = null;
let conversationOn = false;
let alexTalking    = false;
let resumeTimer    = null;
let silenceTimer   = null;
let interruptSR    = null;

// ── STATUS ────────────────────────────────────────────
function setStatus(state, text){
  sdot.className = state;
  stxt.textContent = text;
  waveEl.classList.toggle('on', state === 'listening');
}

// ── CHAT MESSAGES ─────────────────────────────────────
function addMsg(role, text){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'ava';
  av.textContent = role === 'alex' ? 'A' : '🙂';
  const b = document.createElement('div');
  b.className = 'bub';
  b.textContent = text;
  wrap.appendChild(av); wrap.appendChild(b);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping(){
  removeTyping();
  const d = document.createElement('div');
  d.className = 'msg alex'; d.id = 'typ';
  const av = document.createElement('div'); av.className = 'ava'; av.textContent = 'A';
  const b = document.createElement('div'); b.className = 'bub tdots';
  b.innerHTML = '<span></span><span></span><span></span>';
  d.appendChild(av); d.appendChild(b);
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeTyping(){ const e = document.getElementById('typ'); if(e) e.remove(); }

// ── OPENAI CALL ───────────────────────────────────────
async function askAlex(userText){
  history.push({ role: 'user', content: userText });
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENAI_KEY}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: history,
        max_tokens: 180,
        temperature: 0.85
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const reply = data.choices[0].message.content.trim();
    history.push({ role: 'assistant', content: reply });
    return reply;
  } catch(err){
    console.error(err);
    return "Sorry, I had a little hiccup there. Could you say that again?";
  }
}

// ── ALEX RESPONDS ─────────────────────────────────────
async function alexReply(userText){
  if(!userText.trim()) return;
  addMsg('user', userText);
  liveEl.textContent = '';
  showTyping();
  setStatus('thinking', 'Alex is thinking...');

  const reply = await askAlex(userText);
  removeTyping();
  addMsg('alex', reply);
  speakText(reply);
}

function chip(text){
  window.speechSynthesis.cancel();
  stopInterruptListener();
  alexReply(text);
}

// ── SPEECH SYNTHESIS ──────────────────────────────────
function speakText(text){
  window.speechSynthesis.cancel();
  clearTimeout(resumeTimer);

  // Remove any leftover hyphens or bullet chars for clean speech
  const clean = text.replace(/[-–—•]\s*/g, ' ').replace(/\s+/g, ' ').trim();

  const u = new SpeechSynthesisUtterance(clean);
  u.rate   = 0.96;
  u.pitch  = 1.05;
  u.volume = 1;

  const voices = window.speechSynthesis.getVoices();
  const pick = name => voices.find(v => v.name.includes(name));
  const chosen =
    pick('Samantha') || pick('Karen') || pick('Moira') ||
    pick('Google US English') || pick('Microsoft Aria') || pick('Microsoft Jenny') ||
    voices.find(v => /en[-_]US/i.test(v.lang));
  if(chosen) u.voice = chosen;

  // Chrome keep-alive: pause/resume every 10s to prevent cutout
  function keepAlive(){
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(()=>{
      if(window.speechSynthesis.speaking){
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
        keepAlive();
      }
    }, 10000);
  }

  u.onstart = ()=>{
    alexTalking = true;
    keepAlive();
    setStatus('speaking', 'Alex is talking... interrupt anytime!');
    if(conversationOn) startInterruptListener();
  };

  u.onend = ()=>{
    alexTalking = false;
    clearTimeout(resumeTimer);
    stopInterruptListener();
    if(conversationOn) startListening();
  };

  u.onerror = ()=>{
    alexTalking = false;
    clearTimeout(resumeTimer);
    stopInterruptListener();
    if(conversationOn) startListening();
  };

  window.speechSynthesis.speak(u);
}

// ── INTERRUPT LISTENER ────────────────────────────────
function startInterruptListener(){
  const API = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!API || interruptSR) return;
  try{
    interruptSR = new API();
    interruptSR.continuous = false;
    interruptSR.interimResults = true;
    interruptSR.lang = 'en-US';
    interruptSR.onresult = (e)=>{
      const heard = Array.from(e.results).map(r => r[0].transcript).join('').trim();
      if(heard.length > 1){
        window.speechSynthesis.cancel();
        clearTimeout(resumeTimer);
        alexTalking = false;
        stopInterruptListener();
        setTimeout(()=>{
          if(e.results[e.results.length-1].isFinal){
            liveEl.textContent = '';
            alexReply(heard);
          } else {
            startListening();
          }
        }, 80);
      }
    };
    interruptSR.onerror = ()=>{ interruptSR = null; };
    interruptSR.onend   = ()=>{ interruptSR = null; };
    interruptSR.start();
  } catch(e){ interruptSR = null; }
}
function stopInterruptListener(){
  if(interruptSR){ try{ interruptSR.abort(); }catch(e){} interruptSR = null; }
}

// ── SPEECH RECOGNITION ────────────────────────────────
function initSR(){
  const API = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!API){
    micBtn.textContent = '⚠️  USE BUTTONS BELOW';
    micBtn.disabled = true;
    setStatus('error', 'Voice not supported — use Chrome on desktop');
    return;
  }
  SR = new API();
  SR.continuous = false;
  SR.interimResults = true;
  SR.lang = 'en-US';
  SR.maxAlternatives = 1;

  SR.onstart = ()=> setStatus('listening', 'Listening... go ahead!');

  SR.onresult = (e)=>{
    let interim = '', final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t;
      else interim += t;
    }
    liveEl.textContent = interim || final || '';

    if(final.trim()){
      clearTimeout(silenceTimer);
      liveEl.textContent = '';
      stopListening();
      alexReply(final.trim());
    } else if(interim.trim()){
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(()=>{
        if(interim.trim().length > 1){
          liveEl.textContent = '';
          stopListening();
          alexReply(interim.trim());
        }
      }, 1800);
    }
  };

  SR.onerror = (e)=>{
    clearTimeout(silenceTimer);
    if(e.error === 'no-speech'){
      if(conversationOn && !alexTalking) startListening();
    } else if(e.error === 'not-allowed'){
      conversationOn = false;
      updateMicBtn();
      setStatus('error', 'Mic blocked — check browser permissions');
    }
  };

  SR.onend = ()=>{
    if(conversationOn && !alexTalking) startListening();
  };
}

function startListening(){
  if(!SR || alexTalking) return;
  try{ SR.abort(); }catch(e){}
  try{ SR.start(); }catch(e){}
}
function stopListening(){
  try{ SR.stop(); }catch(e){}
}

function updateMicBtn(){
  if(conversationOn){
    micBtn.textContent = '🔴  END CONVERSATION';
    micBtn.classList.add('on');
  } else {
    micBtn.textContent = '🎤  START TALKING TO ALEX';
    micBtn.classList.remove('on');
    setStatus('', 'Tap the mic and just talk naturally');
    waveEl.classList.remove('on');
  }
}

micBtn.addEventListener('click', ()=>{
  conversationOn = !conversationOn;
  updateMicBtn();
  if(conversationOn){
    window.speechSynthesis.cancel();
    startListening();
  } else {
    stopListening();
    stopInterruptListener();
    window.speechSynthesis.cancel();
    clearTimeout(silenceTimer);
    clearTimeout(resumeTimer);
    setStatus('', 'Tap the mic and just talk naturally');
  }
});

// ── BOOT ──────────────────────────────────────────────
function initVoices(cb){
  const v = window.speechSynthesis.getVoices();
  if(v.length){ cb(); return; }
  window.speechSynthesis.onvoiceschanged = cb;
}

initSR();
initVoices(()=>{
  setTimeout(async ()=>{
    showTyping();
    setStatus('thinking', 'Alex is getting ready...');
    const intro = await askAlex("Greet the customer warmly and introduce yourself as Alex from Alex Automotive. Keep it short, natural, and friendly.");
    removeTyping();
    addMsg('alex', intro);
    speakText(intro);
  }, 600);
});
</script>
</body>
</html>
